header:
  version: 14

distro: poky
target: python3-homeassistant

repos:
  meta-homeassistant:

  poky:
    url: https://git.yoctoproject.org/poky
    branch: master
    layers:
      meta:
      meta-poky:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: master
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:

  meta-sca:
    url: "https://github.com/priv-kweihmann/meta-sca.git"
    branch: master
    path: "sources/meta-sca"
    
  meta-python-ai:
    url: "https://github.com/zboszor/meta-python-ai.git"
    path: "sources/meta-python-ai"
    branch: "master"
  
  meta-clang-revival:
    url: "https://github.com/zboszor/meta-clang-revival"
    path: "sources/meta-clang-revival"
    branch: "main"

local_conf_header:

  license_flags: |
    LICENSE_FLAGS_ACCEPTED = "\
      commercial_ffmpeg \
    "
